<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Ignite server node memory budget</title>
  <desc id="desc">A production Ignite node memory budget showing JVM process memory, host RAM, OS page cache, agents, and reserve.</desc>
  <defs>
    <style>
      .label{font-family:Helvetica,Arial,sans-serif;fill:#3c3c3b}
      .muted{fill:#676666}
      .white{fill:#fff}
      .bold{font-weight:700}
      .small{font-size:20px}
      .mid{font-size:24px}
      .large{font-size:34px}
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#ff6716"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#fff"/>

  <rect x="245" y="54" width="790" height="84" rx="10" fill="#de0e06"/>
  <rect x="260" y="68" width="760" height="56" rx="9" fill="#eeeded" stroke="#f08a88" stroke-width="6"/>
  <text x="640" y="105" text-anchor="middle" class="label muted large bold">Ignite Server Node Memory Budget</text>

  <rect x="95" y="175" width="545" height="360" rx="12" fill="#eeeded"/>
  <rect x="210" y="198" width="315" height="62" rx="8" fill="#de0e06"/>
  <rect x="222" y="208" width="291" height="42" rx="7" fill="#f4f3f3" stroke="#f08a88" stroke-width="5"/>
  <text x="368" y="239" text-anchor="middle" class="label muted large bold">JVM Process</text>

  <circle cx="199" cy="364" r="64" fill="#e84f2c"/>
  <text x="199" y="356" text-anchor="middle" class="label white mid bold">Java heap</text>
  <text x="199" y="386" text-anchor="middle" class="label white small bold">(-Xmx)</text>

  <circle cx="356" cy="364" r="64" fill="#b41c59"/>
  <text x="356" y="356" text-anchor="middle" class="label white small bold">Data regions</text>
  <text x="356" y="386" text-anchor="middle" class="label white small bold">off-heap</text>

  <circle cx="513" cy="364" r="64" fill="#680c66"/>
  <text x="513" y="356" text-anchor="middle" class="label white mid bold">Direct /</text>
  <text x="513" y="386" text-anchor="middle" class="label white mid bold">mmap</text>

  <rect x="145" y="455" width="190" height="54" rx="8" fill="#f08327" stroke="#ff6716" stroke-width="6"/>
  <text x="240" y="477" text-anchor="middle" class="label white small bold">Checkpoint</text>
  <text x="240" y="502" text-anchor="middle" class="label white small bold">buffers</text>

  <rect x="360" y="455" width="245" height="54" rx="8" fill="#676666"/>
  <text x="483" y="477" text-anchor="middle" class="label white small bold">Metaspace, code cache,</text>
  <text x="483" y="502" text-anchor="middle" class="label white small bold">thread stacks, JNI</text>

  <path d="M75 300 H115 M75 300 V510 M75 510 H115" fill="none" stroke="#de0e06" stroke-width="6" stroke-linecap="round"/>
  <text x="110" y="580" class="label mid">RSS can be larger than -Xmx</text>

  <path d="M650 355 H720" fill="none" stroke="#ff6716" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="735" y="175" width="430" height="360" rx="12" fill="#eeeded"/>
  <rect x="825" y="198" width="250" height="62" rx="8" fill="#de0e06"/>
  <rect x="837" y="208" width="226" height="42" rx="7" fill="#f4f3f3" stroke="#f08a88" stroke-width="5"/>
  <text x="950" y="239" text-anchor="middle" class="label muted large bold">Host RAM</text>

  <rect x="800" y="300" width="300" height="54" rx="8" fill="#dedcdc"/>
  <text x="950" y="337" text-anchor="middle" class="label mid">OS page cache</text>
  <rect x="800" y="375" width="300" height="54" rx="8" fill="#dedcdc"/>
  <text x="950" y="412" text-anchor="middle" class="label mid">Agents and sidecars</text>
  <rect x="800" y="450" width="300" height="54" rx="8" fill="#dedcdc"/>
  <text x="950" y="487" text-anchor="middle" class="label mid">Emergency reserve</text>

  <line x1="150" y1="615" x2="1110" y2="615" stroke="#de0e06" stroke-width="6" stroke-linecap="round"/>
  <circle cx="150" cy="615" r="12" fill="#de0e06"/>
  <circle cx="1110" cy="615" r="12" fill="#de0e06"/>
  <text x="640" y="665" text-anchor="middle" class="label small">Host RAM must cover heap, off-heap data regions, checkpoint buffers, direct buffers, JVM native memory, OS page cache, sidecars, and reserve.</text>
</svg>
